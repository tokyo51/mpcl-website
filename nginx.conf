server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                                     always;
    add_header X-Content-Type-Options    "nosniff"                                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"      always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;

    # ── Gzip ──────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_types      text/plain text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1000;

    # ── Cache: statische Assets (1 Jahr) ─────────────────────────
    location ~* \.(css|js|svg|woff2|woff|ttf)$ {
        expires 1y;
        access_log off;
    }

    # ── Redirect /seite.html → /seite (301) ──────────────────────
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # ── Clean URLs ────────────────────────────────────────────────
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # ── Error Pages ───────────────────────────────────────────────
    error_page 404 /404.html;
}
