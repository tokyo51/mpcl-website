server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect /page.html → /page (301 permanent)
    location ~ ^(.+)\.html$ {
        return 301 $1;
    }

    # Clean URLs: try exact path, then .html, then directory, then 404
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
